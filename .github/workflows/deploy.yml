name: Deploy to CapRover

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
      
      - name: Install CapRover CLI
        run: npm install -g caprover
      
      - name: Deploy to CapRover
        run: caprover deploy --appName ${{ secrets.CAPROVER_APP }} --appToken ${{ secrets.CAPROVER_APP_TOKEN }} --captainURL ${{ secrets.CAPROVER_URL }}
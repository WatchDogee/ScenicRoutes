version: '3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://www.scenic-routes.live
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=scenic-routes-db
      - DB_USERNAME=root
      - DB_PASSWORD=gdfh5464n4235gsd
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=scenic-routes-db
      - MYSQL_ROOT_PASSWORD=gdfh5464n4235gsd
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
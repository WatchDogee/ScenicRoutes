version: '3'

services:
  app:
    image: webdevops/php-nginx:8.2
    restart: unless-stopped
    ports:
      - "3000:80"
    command: >
      bash -c "
        echo 'Current directory:' && pwd && ls -la &&
        if [ -f 'artisan' ]; then chmod +x artisan; fi &&
        mkdir -p storage/logs storage/framework/sessions storage/framework/views storage/framework/cache &&
        mkdir -p bootstrap/cache &&
        chmod -R 777 storage || true &&
        chmod -R 777 bootstrap/cache || true &&
        touch storage/logs/laravel.log && chmod 666 storage/logs/laravel.log || true &&
        if [ -f '.env.coolify' ]; then cp .env.coolify .env; fi &&
        if [ -f 'artisan' ]; then php artisan key:generate --force; fi &&
        if [ -f 'artisan' ]; then php artisan config:clear; fi &&
        if [ -f 'artisan' ]; then php artisan cache:clear; fi &&
        if [ -f 'artisan' ]; then php artisan view:clear; fi &&
        if [ -f 'artisan' ]; then php artisan route:clear; fi &&
        if [ -f 'artisan' ]; then php artisan storage:link; fi &&
        if [ -f 'artisan' ]; then php artisan migrate --force; fi &&
        supervisord -c /opt/docker/etc/supervisor.conf
      "
    environment:
      # Application settings
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_URL=${APP_URL}

      # Database configuration (external)
      - DB_CONNECTION=mysql
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

      # Cache and session
      - CACHE_DRIVER=file
      - SESSION_DRIVER=cookie
      - QUEUE_CONNECTION=database

      # Mail
      - MAIL_MAILER=${MAIL_MAILER}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}

      # Additional environment variables
      - LOG_CHANNEL=stack
      - BROADCAST_DRIVER=log
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS}
      - SESSION_DOMAIN=${SESSION_DOMAIN}

      # PHP and Nginx configuration
      - PHP_MEMORY_LIMIT=2G
      - PHP_MAX_EXECUTION_TIME=600
      - PHP_POST_MAX_SIZE=64M
      - PHP_UPLOAD_MAX_FILESIZE=64M
      - WEB_DOCUMENT_ROOT=/app/public
      - WEB_DOCUMENT_INDEX=index.php
      - WEB_NGINX_CONF=/app/docker/nginx/custom-nginx.conf

      # Composer settings
      - COMPOSER_MEMORY_LIMIT=-1
    volumes:
      - .:/app
      - app_storage:/app/storage
      - app_bootstrap_cache:/app/bootstrap/cache
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  app_storage:
  app_bootstrap_cache:

networks:
  app_network:
    driver: bridge
